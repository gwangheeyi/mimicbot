ros:
  node_name: open_manipulator_app_bridge
  command_topic: /open_manipulator/motion_command
  mimic_enable_topic: /open_manipulator/mimic_enable
  camera_enable_topic: /open_manipulator/camera_enable
  # 춤 궤적을 브리지가 직접 발행할 팔 컨트롤러 토픽. Gazebo(미키) 기본값.
  arm_command_topic: /arm_controller/joint_trajectory
  # 대상별로 춤 궤적을 보낼 토픽. 여기 없는 대상은 위 기본값을 쓴다.
  # 실물 follower(omx_f_follower_ai.launch.py)는 arm_controller 명령 토픽을
  # /leader/joint_trajectory 로 리맵해 두므로, 맥시(omxAi) 춤은 /leader 로 보낸다.
  # (동작 명령·실시간 모방은 omxAi 프로파일의 motion_server/hand_mimic 리맵으로 이미
  #  /leader 로 간다. 춤만 브리지가 직접 쏘므로 여기서 대상별로 맞춘다.)
  arm_command_topic_by_target:
    omxAi: /leader/joint_trajectory
  # 실물(lerobot) 대상은 동작 명령을 ROS2가 아니라 lerobot 제어 서버(HTTP)로 넘긴다.
  # 여기 있는 대상의 동작버튼(home/ready/attention/salute…)은 이 주소의 /pose 로
  # 전달돼 팔로워를 그 포즈로 옮긴다. 없는 대상은 ROS2 토픽으로 발행(미키).
  lerobot_control_url_by_target:
    omxAi: http://127.0.0.1:8100

# ollama로 춤 동작을 만들 때 쓰는 설정.
dance:
  model: qwen3:4b
  seconds: 5.0
  # CPU 추론이 느릴 수 있어 넉넉히 잡습니다(초). 넘으면 내장 춤으로 대체됩니다.
  timeout: 150.0
  # 실물 로봇(맥시) 춤 안전. 대상이 arm_command_topic_by_target 에 있는(=실물)
  # 경우에만 적용합니다. 미키(가상)는 제한 없이 활발하게 둡니다.
  physical_safety:
    # 관절 각속도 상한(rad/s). 키프레임 사이가 이보다 빠르면 시간을 늘려
    # 천천히 움직이게 합니다("속도를 너무 빨리해서 무리가 가는 행동" 방지).
    max_joint_velocity: 1.5
    # 바닥 찧기 방지용 보수적 관절 한계(라디안). joint1~4.
    # ⚠️ 실제 바닥/책상 높이는 로봇 설치에 따라 다릅니다. 실물에서 어느 값에서
    #    바닥에 닿는지 확인해 특히 joint2(어깨)·joint3(팔꿈치) 하강 한계를 튜닝하세요.
    joint_limits:
      - [-1.6, 1.6]   # joint1 (좌우 회전)
      - [-1.0, 1.0]   # joint2 (어깨: 아래로 덜 내려가게)
      - [-1.0, 1.0]   # joint3 (팔꿈치)
      - [-1.3, 1.3]   # joint4 (손목)

# ollama로 사용자 질문에 대답할 때 쓰는 설정(자율 화면 대화).
chat:
  model: qwen3:4b
  timeout: 60.0

server:
  host: 0.0.0.0
  port: 8000

# "깨우기" 버튼이 한꺼번에 백그라운드로 띄우는 브링업·서비스 목록입니다.
# 대상(미키=Gazebo 가상, 맥시=OMX-AI 실물 follower)마다 띄울 것이 다르므로
# 프로파일로 나눕니다. 앱/스크립트가 /robot/wake 에 target(대상 enum 이름)을
# 보내면 브리지가 해당 프로파일을 띄웁니다. target이 없으면 default_profile.
#
# 한 브리지가 두 대상을 다 다룰 수 있어, 한 컴에서 둘 다 테스트할 수 있습니다.
# 실제 배포(대상별 다른 컴)에서도 각 컴이 자기 프로파일만 쓰면 됩니다.
# 브리지 서버 자신은 이미 떠 있으므로 여기 넣지 않습니다.
# 각 서비스의 로그는 log_dir/<name>.log 에 쌓입니다.
wake:
  log_dir: ~/mimicbot/logs
  # target 없이 오면 이 프로파일을 씁니다(앱의 미키 버튼 등 하위호환).
  default_profile: gazeboLeRobot
  profiles:
    # ── 미키: Gazebo 가상 (RobotTarget.gazeboLeRobot) ──────────────────
    gazeboLeRobot:
      # qwen3 대화·AI 춤에 쓰는 로컬 LLM. persistent=true 라서 미키 깨울 때 이미 떠
      # 있으면 다시 시작하지 않고, 재우기·맥시 전환·재우기 때도 죽이지 않고 그대로 둔다.
      # (한 번 뜨면 계속 살아 있어 모델이 메모리에 유지된다. 맥시 프로파일엔 넣지 않아
      #  맥시 깨울 때 재시작되지 않는다.)
      - name: ollama
        label: Ollama 서버 (qwen3:4b)
        match: ollama
        persistent: true
        cmd: [ollama, serve]
      - name: gazebo
        label: Gazebo 브링업
        cmd:
          - ros2
          - launch
          - open_manipulator_bringup
          - open_manipulator_x_gazebo.launch.py
      - name: camera_bridge
        label: 카메라 브리지
        cmd:
          - ros2
          - run
          - ros_gz_bridge
          - parameter_bridge
          - /front_camera/image@sensor_msgs/msg/Image@gz.msgs.Image
          - /front_camera/camera_info@sensor_msgs/msg/CameraInfo@gz.msgs.CameraInfo
      # Gazebo의 arm_controller는 /arm_controller/joint_trajectory 를 직접 듣는다(리맵 없음).
      - name: motion_server
        label: 모션 서버
        cmd: [ros2, run, open_manipulator_app_control, motion_server]
      - name: hand_mimic
        label: 손 모방 노드
        cmd: [ros2, run, open_manipulator_app_control, hand_mimic_node]
      - name: web_video
        label: 웹 영상 서버
        cmd: [ros2, run, web_video_server, web_video_server]

    # ── 맥시: OMX-AI 실물 리더+팔로워 (RobotTarget.omxAi) ───────────────
    # 실물 맥시는 ROS2가 아니라 lerobot으로 구동한다. 브링업 = lerobot-teleoperate
    # (리더 omx_leader 가 팔로워 omx_follower 를 텔레옵). lerobot이 두 팔의 시리얼
    # (/dev/omx_follower, /dev/omx_leader)을 직접 잡으므로, ROS2 브링업/노드는 여기
    # 넣지 않는다(넣으면 포트를 훔쳐 lerobot 브링업이 실패한다).
    #
    # ⚠️ 앱의 동작명령·실시간모방·춤은 ROS2 토픽 기반이라 lerobot 팔로워에 닿지
    #    않는다(별도 lerobot 연동 필요). 지금 이 프로파일은 "리더-팔로워 텔레옵
    #    브링업"만 담당한다.
    # 맥시 프로파일엔 ollama를 넣지 않는다 — 맥시 깨울 때 재시작하지 않고,
    # 미키때 띄운 ollama가 그대로 살아 있게 둔다(persistent).
    omxAi:
      # lerobot 팔로워 제어 서버 = 리더-팔로워 텔레옵(기본) + 앱 포즈 명령.
      # 리더가 팔로워를 텔레옵하다가, 앱 동작버튼(home/ready/attention/salute)이
      # 브리지를 거쳐 HTTP(:8100)로 오면 팔로워를 그 포즈로 옮긴다.
      # 브리지의 ROS2 환경이 venv와 섞이지 않게 PYTHONPATH를 비우고 venv를 활성화한 뒤
      # 실행한다. exec 로 파이썬이 프로세스를 이어받아, 재우기(SIGINT) 때 신호를
      # 직접 받아 안전하게 연결 해제(팔로워 토크 off)한다.
      - name: lerobot_control
        label: lerobot 팔로워 제어 서버 (teleop + 포즈)
        match: omx_control_server
        cmd:
          - bash
          - -c
          - |
            unset PYTHONPATH
            source ~/venv/il/bin/activate
            cd ~/il_ws/src/lerobot
            exec python ~/mimicbot/scripts/lerobot/omx_control_server.py \
              --follower-port /dev/omx_follower --follower-id omx_follower_arm \
              --leader-port /dev/omx_leader --leader-id omx_leader_arm \
              --http-port 8100 --poses ~/mimicbot/config/omx_poses.json

commands:
  ready: ready
  home: home
  left: left
  right: right
  up: up
  down: down
  open_gripper: open_gripper
  close_gripper: close_gripper
  stop: stop
  attention: attention
  salute: salute